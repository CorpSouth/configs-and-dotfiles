container_always_pull="1"
container_generate_entry=1
container_image_default="quay.io/toolbx-images/debian-toolbox:unstable"
container_manager_additional_flags="--env DBUS_SESSION_BUS_ADDRES=unix:///run/host/var/run/dbus/system_bus_socket"
container_manager="podman"
container_name_default="Siderius"
container_user_custom_home="$HOME/.local/share/containers/home/Siderius/"
non_interactive="1"
skip_workdir="1"

#########################
#Connect to host xserver#
#########################

xhost +si:localuser:$USER >/dev/null 2>&1
