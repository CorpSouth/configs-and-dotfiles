# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, gnome-terminal
bind = SUPERALT, Return, exec, gnome-terminal --profile=Fedora-Rawhide
bind = $mainMod, d, exec, dunstify Date-Time: `date +%I:%M.%p.%F`
bind = SUPERCONTROL, Delete, killactive, 
bindle=,XF86Calculator, exec, flatpak run org.gnome.Calculator
bindle=,XF86Explorer, exec, nautilus
bindle=,XF86HomePage, exec, flatpak run io.gitlab.librewolf-community 
bindle=,XF86Mail, exec, flatpak run eu.betterbird.Betterbird
bind = $mainMod, F, togglefloating, 
bind = $mainMod, Menu, exec, fuzzel
bind = SUPERCONTROL, P, pseudo, # dwindle
bind = SUPERCONTROL, T, togglesplit, # dwindle

# Multimedia binds
bind=,XF86AudioLowerVolume,exec,pactl set-sink-volume @DEFAULT_SINK@ -5%
bind=,XF86AudioRaiseVolume,exec,pactl set-sink-volume @DEFAULT_SINK@ +5%
bind=,XF86AudioMute,exec,pactl set-sink-mute @DEFAULT_SINK@ toggle
bind=,XF86Tools,exec,flatpak run io.github.celluloid_player.Celluloid

# Move focus with mainMod + hjkl keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
#bind = $mainMod, 8, workspace, 8
#bind = $mainMod, 9, workspace, 9
#bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
#bind = $mainMod SHIFT, 8, movetoworkspace, 8
#bind = $mainMod SHIFT, 9, movetoworkspace, 9
#bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Submaps for modal resizing

# will switch to a submap called resize
bind=SUPERCONTROL,R,submap,resize

# will start a submap called "resize"
submap=resize

# sets repeatable binds for resizing the active window
binde=,l,resizeactive,10 0
binde=,h,resizeactive,-10 0
binde=,k,resizeactive,0 -10
binde=,j,resizeactive,0 10

# use reset to go back to the global submap
bind=,escape,submap,reset 

# will reset the submap, meaning end the current one and return to the global one
submap=reset

# Submaps for modal moving

# will switch to a submap called move
bind=SUPERCONTROL,M,submap,move

# will start a submap called "move"
submap=move

# sets repeatable binds for resizing the active window
binde=,h,movewindow,l
binde=,j,movewindow,d
binde=,k,movewindow,u
binde=,l,movewindow,r

# use reset to go back to the global submap
bind=,escape,submap,reset 

# will reset the submap, meaning end the current one and return to the global one
submap=reset

# Submaps for Power and Session

# will switch to a submap called power-and-session
bind=SUPERCONTROL,End,submap,power-and-session

# will start a submap called "power-and-session"
submap=power-and-session

# sets binds for power-and-session, use with discretion!
binde=,End,exec,pkill -KILL -u $USER
binde=,l,exec,sleep 1 && "swaylock -c #000000"
binde=,p,exec,systemctl poweroff
binde=,r,exec,systemctl reboot
binde=,s,exec,systemctl suspend

# use reset to go back to the global submap
bind=,escape,submap,reset

# will reset the submap, meaning end the current one and return to the global one
submap=reset
