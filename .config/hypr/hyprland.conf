windowrulev2 = workspace 1,class:^(.*betterbird.*)$
windowrulev2 = workspace 1,class:^(.*de.haeckerfelix.Fragments.*)$
windowrulev2 = workspace 1,class:^(.*gnome-connections.*)$
windowrulev2 = workspace 1,class:^(.*librewolf.*)$
