windowrulev2 = workspace 5,class:^(.*org.gnome.clocks.*)$
windowrulev2 = workspace 5,class:^(.*org.gnome.font-viewer.*)$
windowrulev2 = workspace 5,class:^(.*org.gnome.Logs.*)$
windowrulev2 = workspace 5,class:^(.*org.freedesktop.MalcontentControl.*)$
windowrulev2 = workspace 5,class:^(.*org.gnome.Nautilus.*)$
windowrulev2 = workspace 5,class:^(.*org.gnome.Settings.*)$
windowrulev2 = workspace 5,class:^(.*org.gnome.Software.*)$
windowrulev2 = workspace 5,class:^(.*org.gnome.Tour.*)$
windowrulev2 = workspace 5,class:^(.*org.gnome.Weather.*)$
windowrulev2 = workspace 5,class:^(.*yelp.*)$

# Workspace 6
windowrulev2 = workspace 6,class:^(.*gnome-boxes.*)$

# Workspace 7
windowrulev2 = workspace 7,class:^(.*evince.*)$
