##############################################################
# borders and gaps                                           #
##############################################################
# I myself don't use gaps anymore since going barless        #
############################################################## 
# see $HOME/.config/i3/rules.conf for enabling gaps & struts #
############################################################## 
# gaps inner|outer|horizontal|vertical|top|right|bottom|left #
# current|all set|plus|minus|toggle <px>                     #
##############################################################
# examples for borders                                       #
##############################################################
# smart_borders on                                           #
# smart_borders no_gaps                                      #
# hide_edge_borders smart_no_gaps                            #
##############################################################
# examples for gaps                                          #
##############################################################
# gaps inner all set 20                                      #
# gaps outer current plus 5                                  #
# gaps horizontal current plus 40                            #
# gaps outer current toggle 60                               #
# smart_gaps on                                              #
# smart_gaps inverse_outer                                   #
##############################################################
# "smart_gaps inverse_outer" enables outer gaps when there's #
# only one container in the workspace                        #
##############################################################
# "gaps inner" by itself sets all gaps and struts equally    #
##############################################################

smart_borders on

###################
# fonts and title #
###################

font xft:Noto Mono
title_align center

