###########
# borders #
###########

smart_borders on

#########
# focal #
#########

focus_follows_mouse        yes 
for_window [urgent=latest] focus

###################
# fonts and title #
###################

font pango: ubuntu mono 12  
for_window [all] title_window_icon no 
title_align center

#######################################################
# gaps and disabling title bars for normal containers #
#######################################################
# "for_window [class="^.*"] border pixel 0" required  #
#                                                     #
# examples:                                           #
#                                                     #
# gaps inner all set 20                               #
# gaps outer current plus 5                           #
# gaps horizontal current plus 40                     #
# gaps outer current toggle 60                        #
#                                                     #
# the 'inner' variable sets all gaps to even spacing  #
#######################################################

for_window [class="^.*"] border pixel 2

########################################## 
# WINDOW RULES START HERE                #
##########################################
# use xprop command for class specifics  #
##########################################
# rules for floating windows by WM_CLASS #
##########################################

for_window [class="Calc"]   floating enable
for_window [class="Gimp"]   floating enable
for_window [class="XClock"] floating enable
for_window [class="Yad"]    floating enable

#############################################
# rules for floating windows by NET_WM_NAME #
#############################################

for_window [title="About Mozilla Firefox"] floating enable
for_window [title="alsamixer"]             floating enable
for_window [title="Event Tester"]          floating enable

####################################################
# rules for floating windows by NET_WM_WINDOW_TYPE #
####################################################

for_window [window_type="dialog"]  floating enable
for_window [window_type="menu"]    floating enable
for_window [window_type="splash"]  floating enable
for_window [window_type="toolbar"] floating enable

##################################
# rules for no focus by WM_CLASS #
##################################

no_focus [class="Calc"]  
no_focus [class="XClock"]

#####################################
# rules for no focus by NET_WM_NAME #
#####################################

no_focus [title="About Mozilla Firefox"]
no_focus [title="Event Tester"]          

#################################
# rules for no focus by WM_ROLE #
#################################

no_focus [window_role="pop-up"]
no_focus [window_role="splash"]

#########################################
# FOCUS BORDER REMOVAL STARTS HERE      #
#########################################
# no focus border by WM_CLASS           #
#########################################
# coincides with the no_focus variables #
#########################################

for_window [class="Calc"]   border pixel 0
for_window [class="XClock"] border pixel 0

##################################
# no focus border by NET_WM_NAME #
##################################

for_window [title="About Mozilla Firefox"] border pixel 0
for_window [title="Event Tester"]          border pixel 0

##############################
# no focus border by WM_ROLE #
##############################

for_window [window_role="pop-up"] border pixel 0
for_window [window_role="splash"] border pixel 0

##########################################
# PER-CONTAINER LAYOUT RULES STARTS HERE # 
##########################################
# rules for stacking windows by WM_CLASS #
##########################################

for_window [class="Firefox"]     layout stacking
for_window [class="thunderbird"] layout stacking

#########################################
# rules for stacking windows by WM_NAME #
#########################################

for_window [title="btop"] layout stacking
for_window [title="htop"] layout stacking
for_window [title="vim"]  layout stacking

#########################################
# rules for tabbing windows by WM_CLASS #
#########################################

for_window [class="BleachBit"]        layout tabbed
for_window [class="mpv"]              layout tabbed
for_window [class="Telegram-Desktop"] layout tabbed
for_window [class="WebCord"]          layout tabbed

########################################
# rules for tabbing windows by WM_NAME #
########################################

for_window [title="spacefm"] layout tabbed
for_window [title="vifm"]    layout tabbed

##########
# popups #
##########

popup_during_fullscreen smart

##############
# scratchpad #
##############

for_window [instance="scratchpad"] move window to scratchpad, scratchpad show

############################################
# WINDOW ASSIGNMENTS START HERE            #
############################################
# assign clients to workspaces by WM_CLASS #
############################################

assign [class="Firefox"]         1
assign [class="thunderbird"]     1
assign [class="TelegramDesktop"] 2
assign [class="WebCord"]         2
assign [class="mpv"]             3
assign [class="BleachBit"]       4
assign [class="Imager"]          4
assign [class="Lxappearance"]    4
assign [class="Spacefm"]         4
assign [class="XClock"]          4
assign [class="Calc"]            5
assign [class="libreoffice"]     5

###########################################
# assign clients to workspaces by WM_NAME #
###########################################

assign [title="cmus"]            3
assign [title="btop"]            4
assign [title="htop"]            4
assign [title="Pi-Apps"]         4
assign [title="vifm"]            4
assign [title="vim"]             5
