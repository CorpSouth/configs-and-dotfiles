###########
# borders #
###########

hide_edge_borders smart

#########
# focal #
#########

focus_follows_mouse no 
focus_wrapping yes 
for_window [urgent=latest] focus

###################
# fonts and title #
###################

font xft: ubuntu-title 
title_align center
for_window [all] title_window_icon no 

################################### 
# CONTAINER RULES START HERE      #
###################################
# use xprop command for specifics #
###################################
# RULES FOR FLOATING START HERE   #
###################################
# rules for floating by WM_CLASS  #
###################################

for_window [class="Calc|feh|Imager|Gimp|Xarchiver|XClock|Yad"] floating enable, move position center 

#####################################
# rules for floating by NET_WM_NAME #
#####################################

for_window [title="About Mozilla Firefox|alsamixer|Event Tester"] floating enable, move position center

############################################
# rules for floating by NET_WM_WINDOW_TYPE #
############################################

for_window [window_type="splash"] floating enable, move position center

##################################
# rules for no focus by WM_CLASS #
##################################

no_focus [class="Calc|XClock"]  

#####################################
# rules for no focus by NET_WM_NAME #
#####################################

no_focus [title="About Mozilla Firefox"]

#################################
# rules for no focus by WM_ROLE #
#################################

no_focus [window_role="pop-up|splash"]

#########################################
# FOCUS BORDER REMOVAL STARTS HERE      #
#########################################
# no focus border by WM_CLASS           #
#########################################
# coincides with the no_focus variables #
#########################################

for_window [class="Calc|XClock|Imager"] border pixel 0

##################################
# no focus border by NET_WM_NAME #
##################################

for_window [title="About Mozilla Firefox"] border pixel 0

##############################
# no focus border by WM_ROLE #
##############################

for_window [window_role="pop-up|splash"] border pixel 0

##########################################
# PER-CONTAINER LAYOUT RULES STARTS HERE # 
##########################################
# rules for stacking by WM_CLASS         #
##########################################

for_window [class="Bleachbit"] layout stacking

#################################
# rules for stacking by WM_NAME #
#################################

for_window [title="btop|top"] layout stacking

#################################
# rules for tabbing by WM_CLASS #
#################################

for_window [class="Firefox|libreoffice|Telegram-Desktop|thunderbird|WebCord"] layout tabbed

################################
# rules for tabbing by WM_NAME #
################################

for_window [title="spacefm"] layout tabbed

##########
# popups #
##########

popup_during_fullscreen smart

#####################################
# SCRATCHPAD ASSIGNMENTS START HERE #
#####################################
# enable the i3 scratchpads utility #
#####################################

for_window [instance="scratchpad"] move window to scratchpad, scratchpad show

##################################
# move to scratchpad by WM_CLASS #
##################################

for_window [class="Calc|XClock"] move to scratchpad, scratchpad show

#####################################
# move to scratchpad by NET_WM_NAME #
#####################################

for_window [title="alsamixer|cmus|htop|nano|vifm"] move window to scratchpad, scratchpad show

####################################
# WORKSPACE ASSIGNMENTS START HERE #
####################################
# assign to workspaces by WM_CLASS #
####################################

assign [class="Firefox|thunderbird"] 1
assign [class="TelegramDesktop|WebCord"] 2
assign [class="mpv"] 4
assign [class="BleachBit|Imager|Lxappearance|Spacefm|Xarchiver|XClock"] 5
assign [class="libreoffice|libreoffice-base|libreoffice-base|libreoffice-calc|libreoffice-draw|libreoffice-impress|libreoffice-writer"] 6

##################################
# assign to workspace by WM_NAME #
##################################

assign [title="btop|htop|top"] 3
assign [title="feh"] 4
assign [title="Pi-Apps"] 5
assign [title="vim"] 6
