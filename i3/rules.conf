#######################################################################
# use this file to define window layout and workspace spawning rules  #
#######################################################################
# "^$" is for exact matching instead of substring matching            #
#######################################################################
# USE THIS PURELY COSMETIC RULE TO DISABLE TITLE BARS AND ENABLE GAPS #
#######################################################################
# other cosmetic variables should go in $HOME/.config/i3/looks.conf   # 
#######################################################################

for_window [class="^.*"] border pixel 2

#################################################################
# allow windows both inside and out of workspace to steal focus #
#################################################################

for_window [urgent=latest] focus

######################################################################
# FLOATING RULES START HERE use 'xprop' to obtain window information #
######################################################################
# specify multiple entries per line with pipe symbol, or '|'         #
######################################################################
# rules legend:                                                      #
# WM_CLASS - "for_window [class="|"]                                 #
# WM_NAME  - "for_window [title="|"]                                 #
# WM_ROLE  - "for_window [role="|"]                                  #
######################################################################  
# "for_window [instance=""]" can be useful for situational ruling,   #
# such as scratchpad instances                                       #
######################################################################
# adjust the  size for floating windows                              #
######################################################################
# or use the general rule "[class=".*"]" for stricter floating size  #
######################################################################

#floating_maximum_size 1600 x 900
#floating_minimum_size 100 x 100
for_window [class=".*"] resize set 640 480

######################################################################
# float by WM_CLASS                                                  #
######################################################################

for_window [class="File Upload|Gimp|Imager|Lxappearance|Nsxiv|Xarchiver|XCalc|XClock|Yad"] floating enable position center

####################
# float by WM_NAME #
####################

for_window [title="About LibreWolf|bash|Event Tester|Preferences|USBImager 1.0.8"] floating enable position center

####################
# float by WM_ROLE #
####################

for_window [window_role="(?i)GtkFileChooserDialog"] floating enable move position center

####################################################
# alternatively you can float-first with this rule #
####################################################

#for_window [class="[.]*"] floating enable position center

###########################################
# dedicating this to my fzf_run launcher  #
###########################################
# just want it to stand apart from others #
###########################################

for_window [title="fzf_run"] floating enable position center
for_window [title="fzf_run"] border pixel 4

#####################################
# SCRATCHPAD RULES START HERE       #
#####################################
# scratchpads are a specific window #
# set to float and can be toggled   #
# in and out of view from a void    #
# separate to the current workspace #
#####################################
# for default terminal scratchpads  #
#####################################
 
for_window [instance="scratchpad"] move scratchpad scratchpad show 

#########################
# scratchpad by WM_NAME #
#########################

for_window [title="alsamixer|bc|Calculator|cmus|htop|nano|neomutt|vifm|xclock"] move scratchpad scratchpad show

############################
# LAYOUT RULES START HERE  #
############################
# layouts: Stacked, Tabbed #
############################
# stack by WM_CLASS        #
############################

for_window [class="^librewolf$"] layout stacked

####################
# stack by WM_NAME #
####################

for_window [title="^Mail$"] layout stacked

############################
# tab by WM_CLASS          #
############################

for_window [class="^BleachBit$|^TelegramDesktop$|^WebCord$"] layout tabbed

##################
# tab by WM_NAME #
##################

for_window [title="^btop$|^htop$|^top$|vim"] layout tabbed

####################################
# WORKSPACE ASSIGNMENTS START HERE #
####################################
# assign by WM_CLASS               #
####################################

assign [class="^librewolf$"] 1
assign [class="^TelegramDesktop$|^WebCord$"] 2
assign [class="^mpv$"] 4
assign [class="^BleachBit$|^Imager$|^Lxappearance$|^Pcmanfm$"] 5
assign [class="^libreoffice-startcenter$"] 6

#####################
# assign by WM_NAME #
#####################

assign [title="^Mail$"] 1
assign [title="^btop$|^top$"] 3
