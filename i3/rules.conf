#######################################################################
# use this file to define window layout and workspace spawning rules  #
#######################################################################
# "^$" is exact match instead of substring                            #
#######################################################################
# USE THIS PURELY COSMETIC RULE TO DISABLE TITLE BARS AND ENABLE GAPS #
#######################################################################

for_window [class=".*"] border pixel 1

#################################################################
# allow windows both inside and out of workspace to steal focus #
#################################################################

for_window [urgent=latest] focus

######################################################################
# FLOATING RULES START HERE use 'xprop' to obtain window information #
######################################################################
# specify multiple entries per line with pipe symbol, or '|'         #
######################################################################
# rules legend:                                                      #
# WM_CLASS - "for_window [class="|"]                                 #
# WM_NAME  - "for_window [title="|"]                                 #
# WM_ROLE  - "for_window [role="|"]                                  #
######################################################################
# "for_window [instance=""]" can be useful for situational ruling    #
######################################################################
# float by WM_CLASS                                                  #
######################################################################

for_window [class="Gimp|Imager|Lxappearance|Nsxiv|Xarchiver|XCalc|XClock|Yad"] floating enable position center

####################
# float by WM_NAME #
####################

for_window [title="About LibreWolf|Event Tester"] floating enable position center

#####################################
# SCRATCHPAD INSTANCES START HERE   #
#####################################
# scratchpads are a specific window #
# set to float and can be toggled   #
# in and out of view from a void    #
# separate to the current workspace #
#####################################
# default scratchpad instance       #
#####################################
 
for_window [instance="scratchpad"] move scratchpad

#########################
# scratchpad by WM_NAME #
#########################

for_window [title="alsamixer|cmus|htop|nano|vifm"] move scratchpad

############################
# LAYOUT RULES START HERE  #
############################
# layouts: Stacked, Tabbed #
############################
# stack by WM_CLASS        #
############################

for_window [class="^TelegramDesktop$|^WebCord$"] layout stacked

####################
# stack by WM_NAME #
####################

for_window [title="^btop$|^htop$|^top$"] layout stacked

###################
# tab by WM_CLASS #
###################

for_window [class="^BleachBit$|^librewolf$|^thunderbird$"] layout tabbed

##################
# tab by WM_NAME #
##################

for_window [title="vim"] layout tabbed

####################################
# WORKSPACE ASSIGNMENTS START HERE #
####################################
# assign by WM_CLASS               #
####################################

assign [class="^librewolf$|^thunderbird$"] 1
assign [class="^TelegramDesktop$|^WebCord$"] 2
assign [class="^mpv$"] 4
assign [class="^BleachBit$|^Imager$|^Lxappearance$|^Pcmanfm$"] 5
assign [class="^Soffice$"] 6

#####################
# assign by WM_NAME #
#####################

assign [title="^btop$|^top$"] 3
