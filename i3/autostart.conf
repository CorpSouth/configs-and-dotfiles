#######################################################
# automatically run the default scratchpad on startup #
#######################################################

exec --no-startup-id urxvt -name scratchpad 

##########################################################
# automatically run common programs ruled as scratchpads #
##########################################################

exec --no-startup-id urxvt -e alsamixer
exec --no-startup-id urxvt -e vifm 

####################################################
# and that's it! I use xinitrc for everything else #
####################################################
